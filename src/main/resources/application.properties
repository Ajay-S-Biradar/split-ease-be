# ===== Server =====
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== MongoDB =====
spring.data.mongodb.uri=${MONGODB_URI}

# ===== JWT =====
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_STRONG_SECRET_KEY_AT_LEAST_256_BITS_LONG_FOR_HS256}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== Firebase =====
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# ===== OpenAPI / Swagger =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== Logging =====
logging.level.com.splitease=${LOG_LEVEL:INFO}

# ===== Cloudinary =====
# Format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
cloudinary.url=${CLOUDINARY_URL:}

# ===== Gemini AI =====
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_API_MODEL:gemini-2.0-flash}